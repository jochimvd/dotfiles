general {
    lock_cmd = dot-cmd-lockscreen
    inhibit_sleep = 3                            # hold systemd sleep-inhibitor until the lock surface has rendered
    before_sleep_cmd = loginctl lock-session     # lock before suspend
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'  # to avoid having to press a key twice to turn on the display
}

listener {
    timeout = 150                                # 2.5min
    on-timeout = brightnessctl -c backlight -s set 10  # dim laptop panel to near-min (avoid 0 on OLED). No-op on desktop
    on-resume = brightnessctl -c backlight -r          # restore
}

listener {
    timeout = 300                               # 5min
    on-timeout = loginctl lock-session          # lock screen when timeout has passed
}

listener {
    timeout = 330                               # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'                                 # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })' && brightnessctl -c backlight -r  # screen on when activity is detected after timeout has fired
}

listener {
    timeout = 1800                              # 30min
    on-timeout = systemctl suspend              # suspend pc
}
